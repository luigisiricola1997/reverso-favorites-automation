name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify import
        run: python -c "import reverso_translate"

      - name: Verify CLI help
        run: python reverso_translate.py --help

      - name: Verify words.txt loads cleanly
        run: |
          python -c "
          from pathlib import Path
          from reverso_translate import load_words
          words, skipped = load_words(Path('words.txt'))
          assert len(words) > 0, 'no words loaded from words.txt'
          print(f'OK: {len(words)} words, {len(skipped)} skipped')
          "
